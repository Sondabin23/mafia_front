<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마피아 게임 - 로비</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 테스트용 간단 인라인 스타일 */
        body { font-family: 'Arial', sans-serif; background-color: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .lobby-container { background-color: #34495e; padding: 30px; border-radius: 10px; text-align: center; width: 350px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        input, button { padding: 10px; margin: 10px 0; width: 90%; border-radius: 5px; border: none; }
        button { background-color: #e74c3c; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #c0392b; }
        .highlight { color: #f1c40f; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="lobby-container">
        <h1>🕵️‍♂️ 마피아 웹 게임</h1>
        
        <div style="margin-bottom: 30px;">
            <h3>새로운 게임 시작</h3>
            <button id="createRoomBtn">방 생성하기</button>
            <div id="newRoomCodeDisplay" style="display: none; margin-top: 10px;">
                생성된 방 코드: <span id="newRoomCode" class="highlight"></span>
            </div>
        </div>

        <hr style="border-color: #7f8c8d;">

        <div>
            <h3>방 입장하기</h3>
            <input type="text" id="roomCodeInput" placeholder="방 코드 6자리 입력" maxlength="6" style="text-transform: uppercase;">
            <input type="text" id="usernameInput" placeholder="사용할 닉네임 입력 (예: 시민1)">
            <button id="joinRoomBtn">입장하기</button>
        </div>
    </div>

    <script src="js/lobby.js"></script>
</body>
</html>
