<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마피아 게임 - 플레이 룸</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="day">
    <div class="game-container">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2 style="margin: 0 0 5px 0;">방 코드: <span id="displayRoomCode"></span></h2>
                <h2 id="phaseDisplay" style="margin: 0;">대기 중 (LOBBY)</h2>
            </div>
            <button id="leaveRoomBtn">🚪 나가기</button>
        </div>

        <div id="roleInfo"></div>

        <div id="chatBox"></div>

        <div class="input-area">
            <input type="text" id="chatInput" placeholder="메시지를 입력하세요...">
            <button id="sendBtn">전송</button>
        </div>

        <div id="hostControls">
            <strong>👑 방장 메뉴:</strong>
            <button id="startBtn">게임 시작</button>
            <button id="testNightBtn">강제 밤 전환</button>
            <button id="testDayBtn">강제 낮 전환</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
