<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마피아 게임 - 플레이 룸</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 20px; transition: background-color 1s, color 1s; }
        /* 낮과 밤 테마 (JS에서 class로 제어) */
        body.day { background-color: #ecf0f1; color: #2c3e50; }
        body.night { background-color: #1a252f; color: #ecf0f1; }
        
        .game-container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid gray; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* 직업 및 상태 알림창 */
        #roleInfo { background-color: #f39c12; color: white; padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; display: none; margin-bottom: 10px; }
        
        /* 채팅창 영역 */
        #chatBox { height: 400px; border: 1px solid #bdc3c7; border-radius: 5px; overflow-y: scroll; padding: 10px; background-color: rgba(255,255,255,0.9); color: black; margin-bottom: 10px; }
        .msg-system { color: #e74c3c; font-weight: bold; font-size: 0.9em; }
        .msg-mafia { color: #c0392b; font-weight: bold; }
        .msg-normal { color: #2c3e50; }
        
        /* 입력 영역 */
        .input-area { display: flex; gap: 10px; }
        #chatInput { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        #sendBtn { padding: 10px 20px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
        
        /* 방장 전용 컨트롤 패널 */
        #hostControls { margin-top: 20px; padding: 10px; background-color: #e67e22; border-radius: 5px; display: none; }
        #hostControls button { margin-right: 5px; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body class="day">
    <div class="game-container">
        <div class="header" style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid gray; padding-bottom: 10px; margin-bottom: 20px;">
    <div>
        <h2 style="margin: 0 0 5px 0;">방 코드: <span id="displayRoomCode"></span></h2>
        <h2 id="phaseDisplay" style="margin: 0;">대기 중 (LOBBY)</h2>
    </div>
    <button id="leaveRoomBtn" style="background-color: #e74c3c; color: white; border: none; border-radius: 5px; padding: 10px 20px; font-weight: bold; cursor: pointer;">
        🚪 나가기
    </button>
</div>

        <div id="roleInfo"></div>

        <div id="chatBox"></div>

        <div class="input-area">
            <input type="text" id="chatInput" placeholder="메시지를 입력하세요...">
            <button id="sendBtn">전송</button>
        </div>

        <div id="hostControls">
            <strong>👑 방장 메뉴:</strong>
            <button id="startBtn">게임 시작</button>
            <button id="testNightBtn">강제 밤 전환</button>
            <button id="testDayBtn">강제 낮 전환</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
