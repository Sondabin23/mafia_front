<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마피아 게임 - 플레이 룸</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="day">
    <div id="remoteAudios" style="display:none;"></div>

    <div class="game-container">
        <div class="header">
            <div>
                <h2>방 코드: <span id="displayRoomCode"></span> <span id="hostBadge" class="host-badge" style="display:none;">👑 방장</span></h2>
                <h2 id="phaseDisplay">대기 중 (LOBBY)</h2>
            </div>
            <button id="leaveRoomBtn">🚪 나가기</button>
        </div>

        <div id="roleInfo"></div>

        <div class="main-layout">
            <div class="chat-area">
                <div id="chatBox"></div>
                <div class="input-area">
                    <input type="text" id="chatInput" placeholder="메시지를 입력하세요...">
                    <button id="sendBtn">전송</button>
                </div>
            </div>
            
            <div class="sidebar">
                <h3>👥 생존자 목록</h3>
                <div id="userList"></div>
            </div>
        </div>

        <div id="hostControls">
    <strong>👑 방장 설정 메뉴:</strong>
    <div style="margin: 10px 0; display: flex; gap: 15px; font-size: 0.9em;">
        <label>☀️ 낮 시간: 
            <input type="number" id="dayTimeInput" value="30" min="5" style="width: 50px; padding: 3px; background: rgba(0,0,0,0.5); color: #f39c12; border: 1px solid #f39c12; text-align: center;"> 초
        </label>
        <label>🌙 밤 시간: 
            <input type="number" id="nightTimeInput" value="20" min="5" style="width: 50px; padding: 3px; background: rgba(0,0,0,0.5); color: #f39c12; border: 1px solid #f39c12; text-align: center;"> 초
        </label>
    </div>
    <button id="startBtn" style="margin-top: 5px;">🎮 설정 적용 및 게임 시작</button>
    </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
