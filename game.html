<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마피아 게임 - 플레이 룸</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="day">
    <div id="remoteAudios" style="display:none;"></div>

    <div class="game-container">
        <div class="header">
            <div>
                <h2>방 코드: <span id="displayRoomCode"></span> <span id="hostBadge" class="host-badge" style="display:none;">👑 방장</span></h2>
                <h2 id="phaseDisplay">대기 중 (LOBBY)</h2>
            </div>
            <button id="leaveRoomBtn">🚪 나가기</button>
        </div>

        <div id="roleInfo"></div>

        <div class="main-layout">
            <div class="chat-area">
                <div id="chatBox"></div>
                <div class="input-area">
                    <input type="text" id="chatInput" placeholder="메시지를 입력하세요...">
                    <button id="sendBtn">전송</button>
                </div>
            </div>
            
            <div class="sidebar">
                <h3>👥 생존자 목록</h3>
                <div id="userList"></div>
            </div>
        </div>

        <div id="hostControls">
            <strong>👑 방장 메뉴:</strong>
            <button id="startBtn">게임 시작</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
